syntax = "proto3";
package model;
option go_package = "internal/model";

message SecureMessage {
    string version = 1;
    uint64 timestamp = 2;
    string nonce = 3;
    bytes encrypted_key = 4;
    bytes encrypted_data = 5;
}

message HttpRequest {
    string method = 1;
    string path = 2;
    map<string, string> headers = 3;
    bytes body = 4;
    string req_id = 5;
}

message HttpResponse {
    int32 status_code = 1;
    string status_text = 2;
    map<string, string> headers = 3;
    bytes body = 4;
    string req_id = 5;
}

message WebSocketMessage {
    oneof content {
        bytes event = 1;
        EventAck event_ack = 2;
        HttpRequest http_request = 3;
        HttpResponse http_response = 4;
    }

    message EventAck {
        string event_id = 1;
    }
}