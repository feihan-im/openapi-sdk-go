syntax = "proto3";
package model;
option go_package = "internal/model";

message SecureMessage {
    string version = 1;
    uint64 timestamp = 2;
    string nonce = 3;
    bytes encrypted_key = 4;
    bytes encrypted_data = 5;
}

message HttpRequest {
    string method = 1;
    string path = 2;
    map<string, string> headers = 3;
    bytes body = 4;
    string req_id = 5;
}

message HttpResponse {
    int32 status_code = 1;
    string status_text = 2;
    map<string, string> headers = 3;
    bytes body = 4;
    string req_id = 5;
}

message WebSocketMessage {
    oneof content {
        uint64 ping_pong = 1;
        InitRequest init_request = 2;
        InitResponse init_response = 3;
        bytes event = 4;
        EventAck event_ack = 5;
        HttpRequest http_request = 6;
        HttpResponse http_response = 7;
    }

    message InitRequest {
        string user_agent = 1;
    }

    message InitResponse {
    }

    message EventAck {
        string event_id = 1;
    }
}